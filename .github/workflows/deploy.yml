name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Bootstrap: install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "==> Installing Docker..."
              apt-get update -qq
              apt-get install -y -qq ca-certificates curl gnupg
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
              apt-get update -qq
              apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              echo "==> Docker installed"
            fi

            # Bootstrap: install Caddy if not present
            if ! command -v caddy &> /dev/null; then
              echo "==> Installing Caddy..."
              apt-get install -y -qq debian-keyring debian-archive-keyring apt-transport-https
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' > /etc/apt/sources.list.d/caddy-stable.list
              apt-get update -qq
              apt-get install -y -qq caddy
              echo "==> Caddy installed"
            fi

            # Bootstrap: clone repo if not present
            if [ ! -d /opt/content-factory ]; then
              echo "==> Cloning repository..."
              mkdir -p /opt/content-factory
              git clone https://github.com/Zuschaua/content-management.git /opt/content-factory
            fi

            cd /opt/content-factory

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Bootstrap: create .env if not present
            if [ ! -f .env ]; then
              echo "==> Creating .env..."
              ENCRYPTION_KEY=$(openssl rand -hex 32)
              cat > .env <<EOF
            NODE_ENV=production
            ENCRYPTION_KEY=${ENCRYPTION_KEY}
            NEXT_PUBLIC_API_URL=http://con.peweo.dev/api
            POSTGRES_USER=contentfactory
            POSTGRES_PASSWORD=contentfactory
            POSTGRES_DB=contentfactory
            MINIO_ROOT_USER=minioadmin
            MINIO_ROOT_PASSWORD=minioadmin123
            MINIO_BUCKET=content-factory
            EOF
              echo "==> .env created"
            fi

            # Configure Caddy reverse proxy
            cat > /etc/caddy/Caddyfile <<'CADDYEOF'
            con.peweo.dev {
              handle /api* {
                reverse_proxy localhost:3001
              }
              handle {
                reverse_proxy localhost:3000
              }
            }
            CADDYEOF
            systemctl reload caddy || systemctl start caddy

            # Deploy
            echo "==> Building and deploying..."
            docker compose up -d --build --remove-orphans

            # Wait for services to be ready
            echo "==> Waiting for services..."
            sleep 30

            echo "==> Service Status:"
            docker compose ps

            echo "==> Health Check:"
            curl -sf http://localhost:3001/api/v1/health && echo "API: OK" || echo "API: FAILED (may still be starting)"
            curl -sf http://localhost:3000 && echo "Web: OK" || echo "Web: FAILED (may still be starting)"

            echo ""
            echo "==> Deployment complete! App available at: http://con.peweo.dev"
